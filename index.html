<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Course Registration Search</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <!-- html2pdf removed — using native browser print-to-PDF instead -->
  <style>
    /* ===== RESET & BASE ===== */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0d0f1a;
      --surface: rgba(255, 255, 255, 0.05);
      --surface-hover: rgba(255, 255, 255, 0.09);
      --border: rgba(255, 255, 255, 0.10);
      --accent: #6C63FF;
      --accent-light: #8b85ff;
      --accent-glow: rgba(108, 99, 255, 0.35);
      --text: #e8eaf0;
      --text-muted: #8a8fa8;
      --success: #34d399;
      --error: #f87171;
      --radius: 14px;
      --radius-sm: 8px;
      --shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      background-image:
        radial-gradient(ellipse at 20% 20%, rgba(108, 99, 255, 0.12) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 80%, rgba(52, 211, 153, 0.06) 0%, transparent 60%);
    }

    /* ===== LAYOUT ===== */
    .app-wrapper {
      max-width: 900px;
      margin: 0 auto;
      padding: 2rem 1.5rem 4rem;
    }

    /* ===== HEADER ===== */
    header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    header .badge {
      display: inline-block;
      background: rgba(108, 99, 255, 0.18);
      color: var(--accent-light);
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 0.3rem 0.85rem;
      border-radius: 100px;
      border: 1px solid rgba(108, 99, 255, 0.3);
      margin-bottom: 0.9rem;
    }

    header h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #fff 40%, var(--accent-light));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.45rem;
    }

    header p {
      color: var(--text-muted);
      font-size: 0.9rem;
      font-weight: 400;
    }

    /* ===== CARD ===== */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      box-shadow: var(--shadow);
      margin-bottom: 1.5rem;
    }

    /* ===== FORM ELEMENTS ===== */
    label {
      display: block;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 0.45rem;
    }

    .input-row {
      display: flex;
      gap: 0.75rem;
      align-items: stretch;
    }

    input[type="text"],
    input[type="url"] {
      width: 100%;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-family: inherit;
      font-size: 0.88rem;
      padding: 0.7rem 1rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input[type="text"]:focus,
    input[type="url"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    input::placeholder {
      color: rgba(255, 255, 255, 0.25);
    }

    button {
      cursor: pointer;
      font-family: inherit;
      font-weight: 600;
      font-size: 0.85rem;
      border: none;
      border-radius: var(--radius-sm);
      padding: 0.7rem 1.4rem;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), #9b8cff);
      color: #fff;
      box-shadow: 0 4px 14px var(--accent-glow);
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px var(--accent-glow);
    }

    .btn-primary:active {
      transform: translateY(0);
    }

    .btn-ghost {
      background: var(--surface-hover);
      border: 1px solid var(--border);
      color: var(--text);
    }

    .btn-ghost:hover {
      background: rgba(255, 255, 255, 0.12);
    }

    /* ===== STATUS ===== */
    #status {
      font-size: 0.82rem;
      padding: 0.5rem 0;
      min-height: 1.4rem;
      transition: color 0.3s;
    }

    #status.ok {
      color: var(--success);
    }

    #status.err {
      color: var(--error);
    }

    #status.info {
      color: var(--text-muted);
    }

    /* ===== SEARCH SECTION ===== */
    .search-wrap {
      position: relative;
    }

    #courseInput {
      width: 100%;
      font-size: 1rem;
      padding: 0.8rem 1.1rem;
    }

    /* ===== DROPDOWN ===== */
    #dropdown {
      position: absolute;
      top: calc(100% + 6px);
      left: 0;
      right: 0;
      background: #1a1d2e;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      max-height: 280px;
      overflow-y: auto;
      z-index: 999;
      box-shadow: 0 16px 48px rgba(0, 0, 0, 0.6);
      display: none;
    }

    #dropdown.open {
      display: block;
    }

    .dd-item {
      padding: 0.7rem 1rem;
      font-size: 0.86rem;
      cursor: pointer;
      border-bottom: 1px solid rgba(255, 255, 255, 0.04);
      transition: background 0.15s;
    }

    .dd-item:last-child {
      border-bottom: none;
    }

    .dd-item:hover,
    .dd-item.active {
      background: rgba(108, 99, 255, 0.18);
      color: var(--accent-light);
    }

    .dd-item mark {
      background: transparent;
      color: var(--accent-light);
      font-weight: 700;
    }

    /* ===== RESULTS ===== */
    #resultsSection {
      display: none;
    }

    .results-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.75rem;
      margin-bottom: 1rem;
    }

    .results-header h2 {
      font-size: 1rem;
      font-weight: 600;
    }

    .results-header .meta {
      font-size: 0.78rem;
      color: var(--text-muted);
      margin-top: 0.15rem;
    }

    .course-title-box {
      background: linear-gradient(135deg, rgba(108, 99, 255, 0.15), rgba(52, 211, 153, 0.08));
      border: 1px solid rgba(108, 99, 255, 0.25);
      border-radius: var(--radius-sm);
      padding: 0.7rem 1rem;
      font-size: 0.92rem;
      font-weight: 600;
      margin-bottom: 1rem;
      color: var(--accent-light);
    }

    .course-title-box .attr {
      display: inline-block;
      margin-left: 0.6rem;
      font-size: 0.72rem;
      font-weight: 500;
      color: var(--text-muted);
      background: rgba(255, 255, 255, 0.07);
      padding: 0.15rem 0.5rem;
      border-radius: 100px;
      vertical-align: middle;
    }

    /* ===== TABLE ===== */
    .table-wrap {
      overflow-x: auto;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.875rem;
    }

    thead tr {
      background: rgba(108, 99, 255, 0.15);
    }

    thead th {
      text-align: left;
      padding: 0.7rem 1rem;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent-light);
      white-space: nowrap;
    }

    tbody tr {
      border-top: 1px solid rgba(255, 255, 255, 0.04);
      transition: background 0.15s;
    }

    tbody tr:hover {
      background: var(--surface-hover);
    }

    tbody td {
      padding: 0.7rem 1rem;
      color: var(--text);
    }

    tbody td:first-child {
      color: var(--text-muted);
      font-size: 0.8rem;
    }

    .roll-no {
      font-family: 'Courier New', monospace;
      font-size: 0.82rem;
      color: var(--success) !important;
    }

    /* ===== PRINT BUTTON ===== */
    .btn-print {
      background: linear-gradient(135deg, #1db954, #16a34a);
      color: #fff;
      display: flex;
      align-items: center;
      gap: 0.45rem;
      box-shadow: 0 4px 14px rgba(29, 185, 84, 0.3);
    }

    .btn-print:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(29, 185, 84, 0.4);
    }

    .btn-print svg {
      width: 15px;
      height: 15px;
    }

    /* ===== DOWNLOAD PDF BUTTON ===== */
    .btn-pdf {
      background: linear-gradient(135deg, #e63946, #c1121f);
      color: #fff;
      display: flex;
      align-items: center;
      gap: 0.45rem;
      box-shadow: 0 4px 14px rgba(230, 57, 70, 0.3);
      border: none;
    }

    .btn-pdf:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(230, 57, 70, 0.45);
    }

    .btn-pdf svg {
      width: 15px;
      height: 15px;
    }

    /* ===== EMPTY STATE ===== */
    .empty {
      text-align: center;
      padding: 2.5rem 1rem;
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    .empty svg {
      width: 40px;
      height: 40px;
      margin-bottom: 0.75rem;
      opacity: 0.35;
    }

    /* ===== SCROLLBAR ===== */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.15);
      border-radius: 4px;
    }

    /* ============================================================
       PRINT STYLES — all text forced to black
    ============================================================ */
    @media print {
      * {
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
        color: #000 !important;
        background: transparent !important;
        -webkit-text-fill-color: #000 !important;
      }

      body {
        background: #fff !important;
        font-size: 11pt;
      }

      .no-print,
      header,
      #dataSection,
      #loadingBar,
      #searchSection {
        display: none !important;
      }

      #resultsSection {
        display: block !important;
        overflow: visible !important;
        height: auto !important;
        max-height: none !important;
      }

      .app-wrapper {
        max-width: 100%;
        padding: 0;
        overflow: visible !important;
        height: auto !important;
      }

      .card {
        border: none !important;
        box-shadow: none !important;
        padding: 0;
        overflow: visible !important;
        height: auto !important;
        max-height: none !important;
        backdrop-filter: none !important;
        -webkit-backdrop-filter: none !important;
      }

      .print-header {
        display: block !important;
        text-align: center;
        margin-bottom: 1rem;
        border-bottom: 2px solid #000 !important;
        padding-bottom: 0.5rem;
      }

      .print-header h2 {
        font-size: 14pt;
        font-weight: 700;
      }

      .print-header p {
        font-size: 10pt;
        margin-top: 0.2rem;
      }

      .course-title-box {
        border: 1px solid #000 !important;
        padding: 0.5rem 0.75rem;
        margin-bottom: 0.75rem;
        font-size: 10.5pt;
        font-weight: 700;
        page-break-inside: avoid;
      }

      .course-title-box .attr {
        font-weight: 500;
      }

      .results-header {
        display: none;
      }

      table {
        font-size: 10pt;
        border-collapse: collapse;
        width: 100%;
        page-break-inside: auto;
      }

      thead {
        display: table-header-group;
      }

      tfoot {
        display: table-footer-group;
      }

      thead tr {
        background: #e0e0e0 !important;
      }

      thead th {
        font-size: 9pt;
        font-weight: 700;
        padding: 6px 10px;
        border: 1px solid #000 !important;
      }

      tbody tr {
        break-inside: avoid;
        page-break-inside: avoid;
      }

      tbody td {
        padding: 6px 10px;
        border: 1px solid #999 !important;
      }

      tbody tr:nth-child(even) {
        background: #f5f5f5 !important;
      }

      .roll-no {
        font-family: 'Courier New', monospace;
      }

      .table-wrap {
        border: none !important;
        overflow: visible !important;
        height: auto !important;
        max-height: none !important;
      }

      #resultsBody tr:last-child {
        page-break-after: auto;
      }

      @page {
        size: A4;
        margin: 1.5cm 1.8cm;
      }
    }

    /* Print header hidden on screen */
    .print-header {
      display: none;
    }
  </style>
</head>

<body>
  <div class="app-wrapper">

    <!-- HEADER -->
    <header>
      <div class="badge">Registration Lookup</div>
      <h1>Course Registration Search</h1>
      <p>Search by course name to view enrolled students</p>
    </header>

    <!-- LOADING STATUS BAR (hidden once loaded) -->
    <div id="loadingBar" style="text-align:center;padding:0.6rem 0;">
      <span id="status" class="info">⏳ Loading registration data…</span>
    </div>

    <!-- SEARCH -->
    <div class="card" id="searchSection" style="display:none;">
      <label for="courseInput">Search Course</label>
      <div class="search-wrap">
        <input type="text" id="courseInput" placeholder="Type at least 3 characters to search courses…"
          autocomplete="off" />
        <div id="dropdown"></div>
      </div>
    </div>

    <!-- RESULTS -->
    <div id="resultsSection">
      <!-- Print-only header -->
      <div class="print-header">
        <h2 id="printTitle"></h2>
        <p id="printMeta"></p>
      </div>

      <div class="card">
        <div class="results-header">
          <div>
            <h2>Enrolled Students</h2>
            <div class="meta" id="resultsMeta"></div>
          </div>
          <div style="display:flex;gap:0.6rem;flex-wrap:wrap;">
            <button class="btn-print btn-ghost" onclick="window.print()">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                stroke-linejoin="round">
                <polyline points="6 9 6 2 18 2 18 9" />
                <path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2" />
                <rect x="6" y="14" width="12" height="8" />
              </svg>
              Print
            </button>
            <button class="btn-pdf" onclick="downloadPDF()" id="pdfBtn">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                stroke-linejoin="round">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
                <polyline points="14 2 14 8 20 8" />
                <line x1="12" y1="18" x2="12" y2="12" />
                <line x1="9" y1="15" x2="15" y2="15" />
              </svg>
              Download PDF
            </button>
          </div>
        </div>

        <div class="course-title-box" id="courseTitleBox"></div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>#</th>
                <th>Student Name</th>
                <th>College Roll No</th>
                <th>Programme</th>
              </tr>
            </thead>
            <tbody id="resultsBody"></tbody>
          </table>
        </div>
      </div>
    </div>

  </div><!-- end app-wrapper -->

  <script>
    let allRows = [];
    let courses = [];
    let activeIndex = -1;

    /* ─── BACKEND CONFIG ────────────────────────────────── */
    const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vThwqTDHV_A17Q1ldiITxCRG0vxCpRiAL_FDD7JlLRFOpGjWnCxsEo27Lp7Bxjj9r9I8VKKFOh1LmD2/pub?gid=0&single=true&output=csv';

    /* ─── LOAD CSV ─────────────────────────────────────── */
    function loadData() {
      /* When opened via file:// the browser blocks cross-origin fetches.
         Route through a public CORS proxy automatically in that case. */
      const isFileProtocol = window.location.protocol === 'file:';
      const fetchUrl = isFileProtocol
        ? 'https://api.allorigins.win/raw?url=' + encodeURIComponent(CSV_URL)
        : CSV_URL;

      setStatus('⏳ Fetching data…', 'info');
      document.getElementById('searchSection').style.display = 'none';
      document.getElementById('resultsSection').style.display = 'none';
      document.getElementById('courseInput').value = '';
      allRows = []; courses = [];

      Papa.parse(fetchUrl, {
        download: true,
        header: true,
        skipEmptyLines: true,
        complete: function (results) {
          if (!results.data || results.data.length === 0) {
            setStatus('No data found in the sheet.', 'err'); return;
          }
          allRows = results.data;

          // Build unique course list
          const seen = new Set();
          allRows.forEach(r => {
            const c = (r['Course'] || r['course'] || '').trim();
            if (c && !seen.has(c)) { seen.add(c); courses.push(c); }
          });
          courses.sort();

          // Hide loading bar, show search
          document.getElementById('loadingBar').style.display = 'none';
          setStatus(`✓ Loaded ${allRows.length} records across ${courses.length} courses.`, 'ok');
          document.getElementById('searchSection').style.display = 'block';
          document.getElementById('courseInput').focus();
        },
        error: function (err) {
          setStatus('❌ Error loading data. Please check your internet connection.', 'err');
          console.error(err);
        }
      });
    }

    /* ─── STATUS ────────────────────────────────────────── */
    function setStatus(msg, type) {
      const el = document.getElementById('status');
      el.textContent = msg;
      el.className = type;
    }

    /* ─── AUTOCOMPLETE ───────────────────────────────────── */
    const courseInput = document.getElementById('courseInput');
    const dropdown = document.getElementById('dropdown');

    courseInput.addEventListener('input', () => {
      const q = courseInput.value.trim();
      activeIndex = -1;
      if (q.length < 3) { closeDropdown(); return; }

      const filtered = courses.filter(c => c.toLowerCase().includes(q.toLowerCase()));
      if (filtered.length === 0) { closeDropdown(); return; }

      dropdown.innerHTML = '';
      filtered.forEach((c, i) => {
        const div = document.createElement('div');
        div.className = 'dd-item';
        div.innerHTML = highlight(c, q);
        div.addEventListener('mousedown', () => selectCourse(c));
        dropdown.appendChild(div);
      });
      dropdown.classList.add('open');
    });

    courseInput.addEventListener('keydown', e => {
      const items = dropdown.querySelectorAll('.dd-item');
      if (!dropdown.classList.contains('open') || items.length === 0) return;

      if (e.key === 'ArrowDown') {
        e.preventDefault();
        activeIndex = Math.min(activeIndex + 1, items.length - 1);
        updateActive(items);
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        activeIndex = Math.max(activeIndex - 1, 0);
        updateActive(items);
      } else if (e.key === 'Enter') {
        e.preventDefault();
        if (activeIndex >= 0) items[activeIndex].dispatchEvent(new Event('mousedown'));
        else if (items.length === 1) items[0].dispatchEvent(new Event('mousedown'));
      } else if (e.key === 'Escape') {
        closeDropdown();
      }
    });

    document.addEventListener('click', e => {
      if (!e.target.closest('#searchSection')) closeDropdown();
    });

    function updateActive(items) {
      items.forEach((el, i) => el.classList.toggle('active', i === activeIndex));
      if (activeIndex >= 0) items[activeIndex].scrollIntoView({ block: 'nearest' });
    }

    function closeDropdown() {
      dropdown.classList.remove('open');
      dropdown.innerHTML = '';
    }

    function highlight(text, query) {
      const idx = text.toLowerCase().indexOf(query.toLowerCase());
      if (idx === -1) return escHtml(text);
      return escHtml(text.slice(0, idx))
        + '<mark>' + escHtml(text.slice(idx, idx + query.length)) + '</mark>'
        + escHtml(text.slice(idx + query.length));
    }

    function escHtml(str) {
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    /* ─── SELECT COURSE & RENDER ─────────────────────────── */
    function selectCourse(course) {
      courseInput.value = course;
      closeDropdown();

      const matching = allRows.filter(r => (r['Course'] || '').trim() === course);
      const attribute = matching.length ? (matching[0]['Attribute'] || '').trim() : '';

      renderResults(course, attribute, matching);
    }

    function renderResults(course, attribute, rows) {
      const section = document.getElementById('resultsSection');
      const body = document.getElementById('resultsBody');
      const metaEl = document.getElementById('resultsMeta');
      const titleBox = document.getElementById('courseTitleBox');

      // Course title box
      titleBox.innerHTML = escHtml(course)
        + (attribute ? `<span class="attr">${escHtml(attribute)}</span>` : '');

      // Print header
      document.getElementById('printTitle').textContent = course;
      document.getElementById('printMeta').textContent =
        `${attribute ? attribute + ' · ' : ''}${rows.length} student${rows.length !== 1 ? 's' : ''} enrolled · Printed on ${new Date().toLocaleDateString('en-IN', { day: '2-digit', month: 'long', year: 'numeric' })}`;

      // Meta
      metaEl.textContent = `${rows.length} student${rows.length !== 1 ? 's' : ''} found`;

      // Table
      body.innerHTML = '';
      if (rows.length === 0) {
        body.innerHTML = `<tr><td colspan="4" style="text-align:center;padding:2rem;color:#8a8fa8;">No students found for this course.</td></tr>`;
      } else {
        rows.forEach((r, i) => {
          const tr = document.createElement('tr');
          tr.innerHTML = `
          <td>${i + 1}</td>
          <td>${escHtml((r['Student Name'] || '').trim())}</td>
          <td class="roll-no">${escHtml((r['College Roll No'] || '').trim())}</td>
          <td>${escHtml((r['Programme'] || '').trim())}</td>
        `;
          body.appendChild(tr);
        });
      }

      section.style.display = 'block';
      section.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    /* ─── DOWNLOAD PDF (via popup window + native print) ──── */
    function downloadPDF() {
      const course = document.getElementById('printTitle').textContent || 'Course';
      const meta = document.getElementById('printMeta').textContent;
      const titleBox = document.getElementById('courseTitleBox').innerHTML;
      const tableHTML = document.getElementById('resultsBody').innerHTML;

      // Build a full standalone HTML document with embedded styles
      const html = `<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<title>${escHtml(course)}</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; color: #000 !important; }
  body { font-family: Arial, sans-serif; font-size: 10pt; padding: 20px; background: #fff; }
  .header { text-align: center; border-bottom: 2px solid #000; padding-bottom: 8px; margin-bottom: 14px; }
  .header h2 { font-size: 14pt; font-weight: 700; }
  .header p { font-size: 9.5pt; margin-top: 4px; }
  .title-box { border: 1px solid #000; padding: 6px 10px; margin-bottom: 12px; font-weight: 700; font-size: 10pt; }
  .title-box .attr { font-weight: 500; font-size: 0.85em; margin-left: 6px; }
  table { width: 100%; border-collapse: collapse; font-size: 9.5pt; page-break-inside: auto; }
  thead { display: table-header-group; }
  thead tr { background: #e0e0e0 !important; }
  th { border: 1px solid #000; padding: 5px 8px; text-align: left; font-size: 8.5pt; font-weight: 700; color: #000 !important; }
  td { border: 1px solid #999; padding: 5px 8px; color: #000 !important; }
  tr { page-break-inside: avoid; break-inside: avoid; }
  tr:nth-child(even) { background: #f5f5f5 !important; }
  .roll-no { font-family: 'Courier New', monospace; color: #000 !important; }
  @media print {
    body { padding: 0; }
    @page { size: A4; margin: 1.5cm 1.8cm; }
  }
</style>
</head><body>
  <div class="header">
    <h2>${escHtml(course)}</h2>
    <p>${escHtml(meta)}</p>
  </div>
  <div class="title-box">${titleBox}</div>
  <table>
    <thead>
      <tr>
        <th>#</th><th>STUDENT NAME</th><th>COLLEGE ROLL NO</th><th>PROGRAMME</th>
      </tr>
    </thead>
    <tbody>${tableHTML}</tbody>
  </table>
</body></html>`;

      // Open a new window, write the clean HTML, and trigger print
      const win = window.open('', '_blank', 'width=800,height=600');
      win.document.write(html);
      win.document.close();
      win.onload = () => {
        win.print();
        // Don't auto-close — let user save as PDF first
      };
    }

    /* ─── AUTO-LOAD ON PAGE OPEN ─────────────────────────── */
    window.addEventListener('DOMContentLoaded', () => {
      loadData();
    });
  </script>
</body>

</html>
